name: Deploy Privacy Policy to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - PRIVACY_POLICY.md
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p site
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>GymCalc Privacy Policy</title>
            <style>
              :root { color-scheme: light dark; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                margin: 0;
                padding: 2rem;
                max-width: 860px;
                margin-inline: auto;
              }
              h1, h2 { line-height: 1.25; }
              code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
            </style>
          </head>
          <body>
          EOF
          python3 - <<'PY' >> site/index.html
          import html
          import re
          from pathlib import Path

          text = Path('PRIVACY_POLICY.md').read_text(encoding='utf-8').splitlines()

          in_list = False
          for line in text:
              if line.startswith('# '):
                  if in_list:
                      print('</ul>')
                      in_list = False
                  print(f'<h1>{html.escape(line[2:])}</h1>')
              elif line.startswith('## '):
                  if in_list:
                      print('</ul>')
                      in_list = False
                  print(f'<h2>{html.escape(line[3:])}</h2>')
              elif line.startswith('- '):
                  if not in_list:
                      print('<ul>')
                      in_list = True
                  print(f'<li>{html.escape(line[2:])}</li>')
              elif not line.strip():
                  if in_list:
                      print('</ul>')
                      in_list = False
              else:
                  if in_list:
                      print('</ul>')
                      in_list = False
                  safe = html.escape(line)
                  safe = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', safe)
                  print(f'<p>{safe}</p>')
          if in_list:
              print('</ul>')
          PY
          cat >> site/index.html <<'EOF'
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4